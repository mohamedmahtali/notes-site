name: Link Check

on:
  push:
    branches:
      - main
    paths:
      - "content/**/*.md"
  pull_request:
    paths:
      - "content/**/*.md"
  schedule:
    # Vérification hebdomadaire (chaque lundi à 8h UTC)
    - cron: "0 8 * * 1"
  workflow_dispatch:

jobs:
  link-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >
            --verbose
            --no-progress
            --offline
            './content/**/*.md'
          fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
